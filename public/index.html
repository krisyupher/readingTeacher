<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Teacher</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/web/pdf_viewer.css" />
</head>
<body>
  <header>
    <h1>Reading Teacher</h1>
    <button id="theme-toggle" class="theme-toggle" type="button" title="Toggle theme">Dark mode</button>
  </header>

  <main>
    <section id="setup" class="card">
      <textarea id="reading-input" placeholder="Paste or type text here, or drop a PDF / .txt file onto this box"></textarea>
      <div class="row">
        <button id="start-btn">Start practicing</button>
        <button id="attach-btn" class="secondary" type="button">Attach file</button>
        <input type="file" id="file-input" accept=".pdf,.txt,application/pdf,text/plain" hidden />
        <span id="file-status" class="hint"></span>
        <span id="char-count" class="hint">0 characters</span>
      </div>
    </section>

    <section id="practice" class="card hidden">
      <div class="practice-grid">
        <aside class="pane lookup-sidebar" id="pane-search">
          <div class="pane-header">
            <div class="pane-title-row">
              <h3>Word lookup</h3>
              <button class="pane-toggle" data-pane="search" type="button" title="Minimize">−</button>
            </div>
            <p class="sidebar-hint">Double-click or highlight a word in the reading to look it up.</p>
            <div class="lookup-form">
              <input type="text" id="lookup-input" placeholder="Or type a word..." />
              <button id="lookup-btn" class="secondary">Look up</button>
            </div>
          </div>
          <div class="pane-body">
            <div id="lookup-status" class="sidebar-hint"></div>
            <div id="lookup-result" class="lookup-result hidden"></div>
          </div>
        </aside>

        <div class="pane reading-pane" id="pane-reading">
          <div class="pane-header"><h3>Reading</h3></div>
          <div id="reading-display" class="reading-display"></div>
        </div>

        <div class="pane qa-pane" id="pane-qa">
          <div class="pane-header">
            <div class="pane-title-row">
              <h3>Practice</h3>
              <button class="pane-toggle" data-pane="qa" type="button" title="Minimize">−</button>
            </div>
          </div>
          <div class="pane-body">
            <div id="qa-area">
              <div id="question-box" class="question-box">
                <span class="label">Question</span>
                <p id="question-text">Loading...</p>
              </div>

              <textarea id="answer-input" placeholder="Type your answer in English..."></textarea>

              <div class="row">
                <button id="submit-btn">Submit answer</button>
                <button id="next-btn" class="hidden">Next question</button>
                <button id="reset-btn" class="secondary">Change reading</button>
              </div>

              <div id="feedback-box" class="feedback-box hidden">
                <span class="label" id="feedback-label">Feedback</span>
                <p id="feedback-text"></p>
              </div>
            </div>

            <details id="history-details">
              <summary>History (<span id="history-count">0</span>)</summary>
              <ol id="history-list"></ol>
            </details>
          </div>
        </div>
      </div>
    </section>

    <div id="error-banner" class="error hidden"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    }
    // Leave empty for local dev (same origin). For GitHub Pages, set to your
    // backend URL, e.g. 'https://reading-teacher-api.onrender.com'
    window.READING_TEACHER_API_BASE = '';
  </script>
  <script src="app.js"></script>
</body>
</html>
