<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Teacher</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/web/pdf_viewer.css" />
</head>
<body>
  <header>
    <h1 data-i18n="app_title">Reading Teacher</h1>
    <button id="theme-toggle" class="theme-toggle" type="button">Dark mode</button>
  </header>

  <main>
    <section id="setup" class="card">
      <textarea id="reading-input" data-i18n-placeholder="reading_placeholder" placeholder="Paste or type text here, or drop a PDF / .txt file onto this box"></textarea>
      <div class="row">
        <button id="start-btn" data-i18n="start_btn">Start practicing</button>
        <button id="attach-btn" class="secondary" type="button" data-i18n="attach_btn">Attach file</button>
        <input type="file" id="file-input" accept=".pdf,.txt,application/pdf,text/plain" hidden />
        <label for="language-select" class="lang-label" data-i18n="language_label">Language</label>
        <select id="language-select" class="lang-select">
          <option value="English">English</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="Portuguese">Portuguese</option>
        </select>
        <span id="file-status" class="hint"></span>
        <span id="char-count" class="hint">0 characters</span>
      </div>
    </section>

    <section id="practice" class="card hidden">
      <div class="practice-grid">
        <aside class="pane lookup-sidebar" id="pane-search">
          <div class="pane-header">
            <div class="pane-title-row">
              <h3 data-i18n="word_lookup">Word lookup</h3>
              <button class="pane-toggle" data-pane="search" type="button">−</button>
            </div>
            <p class="sidebar-hint" data-i18n="lookup_hint">Double-click or highlight a word in the reading to look it up.</p>
            <div class="lookup-form">
              <input type="text" id="lookup-input" data-i18n-placeholder="lookup_placeholder" placeholder="Or type a word..." />
              <button id="lookup-btn" class="secondary" data-i18n="lookup_btn">Look up</button>
            </div>
          </div>
          <div class="pane-body">
            <div id="lookup-status" class="sidebar-hint"></div>
            <div id="lookup-result" class="lookup-result hidden"></div>
          </div>
        </aside>

        <div class="pane reading-pane" id="pane-reading">
          <div class="pane-header reading-pane-header">
            <h3 data-i18n="reading">Reading</h3>
            <button id="listen-btn" class="secondary small" type="button">🔊 Listen</button>
          </div>
          <div id="reading-display" class="reading-display"></div>
        </div>

        <div class="pane qa-pane" id="pane-qa">
          <div class="pane-header">
            <div class="pane-title-row">
              <h3 data-i18n="practice">Practice</h3>
              <button class="pane-toggle" data-pane="qa" type="button">−</button>
            </div>
          </div>
          <div class="pane-body">
            <div id="qa-area">
              <div id="question-box" class="question-box">
                <span class="label" data-i18n="question_label">Question</span>
                <p id="question-text"></p>
              </div>

              <textarea id="answer-input" placeholder="Type your answer in English..."></textarea>

              <div class="row">
                <button id="submit-btn" data-i18n="submit_btn">Submit answer</button>
                <button id="next-btn" class="hidden" data-i18n="next_btn">Next question</button>
                <button id="reset-btn" class="secondary" data-i18n="reset_btn">Change reading</button>
              </div>

              <div id="feedback-box" class="feedback-box hidden">
                <span class="label" id="feedback-label">Feedback</span>
                <p id="feedback-text"></p>
              </div>
            </div>

            <details id="history-details">
              <summary><span data-i18n="history">History</span> (<span id="history-count">0</span>)</summary>
              <ol id="history-list"></ol>
            </details>
          </div>
        </div>
      </div>
    </section>

    <div id="error-banner" class="error hidden"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    }
    // Leave empty for local dev (same origin). For GitHub Pages, set to your
    // backend URL, e.g. 'https://reading-teacher-api.onrender.com'
    window.READING_TEACHER_API_BASE = '';
  </script>
  <script src="app.js"></script>
</body>
</html>
